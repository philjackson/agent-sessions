# agent-sessions configuration.
#
# Each style section accepts:
#   fg, bg                 colour: an ANSI/256 number ("0"-"255") or hex ("#rrggbb")
#   bold, faint, reverse   boolean attributes
# Omitted keys keep their defaults.

[styles.running]   # sessions whose turn is in progress
fg = "10"
bold = true

[styles.waiting]   # sessions blocked on the user, e.g. a permission prompt
fg = "3"
bold = true

[styles.idle]      # sessions waiting for the next prompt
fg = "6"

[styles.unread]    # sessions that finished a turn you haven't opened yet
fg = "208"
bold = true

[styles.offline]   # sessions with no running claude process
faint = true

[styles.dimmed]    # sessions with no activity for over a day
faint = true

[styles.bar]       # the help and status bars
reverse = true

[styles.prompt]    # the bottom bar during search, text prompts, and pickers
bg = "17"

[styles.worktree]  # marker shown next to worktree projects
fg = "3"
bold = true

[styles.selected]  # the cursor row
reverse = true

[circleci]
# With a token (set here or via $CIRCLECI_TOKEN / $CIRCLE_TOKEN), the
# index gains a column showing the latest CircleCI status of each
# session's branch: pass, fail, run, hold, or - when the branch has no
# pipelines. The project slug is derived from the git origin remote
# (github.com/org/repo -> gh/org/repo); override it per project
# directory when that's wrong:
#   [circleci.projects]
#   "~/Projects/foo" = "gh/acme/foo"
token = ""

[styles.preview]  # the last-message text shown per session
faint = true

[sort]
# How to order the index: a comma-separated list of dimensions, most
# significant first. Recency (newest activity, live floated up) is always the
# final tie-breaker, so an empty or unknown value gives that plain order.
#   active   live sessions (a running claude process) ahead of the rest.
#   repo     cluster every session of a git repo — across all its worktrees —
#            into one block, repos ordered live-first then by recency.
# The order of the two is what matters:
#   "repo"         whole repos stay together, live-first inside each block. A
#                  repo with many finished sessions can push another repo's live
#                  session far down the list.
#   "active,repo"  every live session first (grouped by repo), then everything
#                  finished — so a busy repo's backlog never buries another
#                  repo's active work.
#   "activity"     (default) newest first, live floated to the top.
group = "activity"

[status]
# Marker shown at the start of each row for its status. Defaults are Nerd
# Font icons (need a Nerd Font in your terminal). For a plain terminal use
# dots:   running="●" waiting="●" idle="·" unread="●" offline=" "
# or emoji: running="🟢" waiting="🟡" idle="⚪" unread="🟠" offline=" "
# running = "spinner" animates a braille spinner instead of a static glyph.
running = "spinner"
waiting = ""
idle    = "·"
unread  = ""
offline = " "
# Show the state word (running/waiting/idle) next to the glyph. Set false for
# a compact, icon-only column.
words = true

[preview]
# How to show each session's last assistant message. mode is "row" (a
# detail line beneath the session), "column" (an inline column), or "off".
mode = "column"
recent = 5      # in row mode, always preview this many recent sessions...
within = "20m"  # ...modified within this window (a Go duration)

[worktree]
# Marker shown next to projects that are git worktrees (not the main repo).
# Set to "" to hide it.
glyph = "wt"

[tmux]
# Marker shown next to live sessions running inside a tmux pane, i.e. the
# ones the default Enter command can jump to. Set to "" to hide it.
glyph = "⊟"

[commands]
# Shell commands bound to keys, run on the selected session. Keys are
# Bubble Tea key names: single characters ("o", "D"), "enter", or combos
# like "ctrl+x" and "f5" (quote names with + or . in them). {id}, {pid},
# {cwd}, {file} and {pane} expand to shell-quoted values; {pane} is the
# tmux pane hosting the session's claude process, and commands using it
# are only run for sessions found in a pane. Two placeholders are
# interactive and resolve before the command runs: {project-picker} opens
# a selection screen over every known project and expands to the chosen
# project's path, and {text-input} (or {text-input:Some label}) asks for
# a line of text. Bindings here take precedence over the built-in keys;
# set one to "" to unbind it.
#
# Appending ? makes a gated placeholder optional: {pane?} and {pid?}
# expand to an empty string instead of preventing the command from
# running, so one command (or a script it calls, e.g.
# open-session {state} {pane?} {cwd} {id}) can branch on it.
#
# More examples:
#   o = "cd {cwd} && $EDITOR ."
#   t = "less +G {file}"
#   n = "cd {project-picker} && claude"
#   b = "xdg-open {ci-build-url}"   # open on macOS; needs [circleci]

# If the session is running in a tmux pane, jump to it: switch-client
# moves the client when run inside tmux, attach-session takes over the
# terminal when run outside it. Otherwise resume the session in a fresh
# tmux window: the window starts an interactive shell — so your usual
# environment setup (rc files, version managers like asdf, per-directory
# tools like direnv, ...) applies — and the claude command is typed into it.
enter = '''
if [ -n {pane?} ]; then
    tmux select-pane -t {pane?} && tmux select-window -t {pane?}
    tmux switch-client -t {pane?} 2>/dev/null || tmux attach-session -t {pane?}
else
    p=$(tmux new-window -P -F "#{pane_id}" -c {cwd})
    tmux send-keys -t "$p" "claude --resume {id}" Enter
fi
'''

# New claude in a fresh tmux window: pick a project, type the first
# prompt. As with enter, the window starts an interactive shell and the
# claude command is typed into it.
c = '''
p=$(tmux new-window -P -F "#{pane_id}" -c {project-picker})
tmux send-keys -t "$p" "claude {text-input:Prompt}" Enter
'''
